name: Build & push cmtecnologia.pt image (VPS)

# Builds the self-hosted Docker image in CI (Linux) and pushes it to GHCR.
# Build happens HERE, never on the VPS. The VPS only pulls + restarts.
# Server secrets (Gemini, Resend, Telegram) are NEVER built in; they live in the
# VPS runtime env file. See docs/DEPLOY.md.

on:
  push:
    # Single source of truth: main. feat/vps-migration was merged into main
    # on 2026-06-16 — the VPS migration is fully consolidated, so production
    # and all future work live on main only.
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/mateusjuni0/cmtecnologia-site-v2

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # One-shot tarball so the VPS can `docker load` without pulling from GHCR
      # (used while the package visibility / pull-auth is being sorted). Cheap,
      # 1-day retention; safe to remove once GHCR pull works on the VPS.
      - name: Export image tarball
        run: |
          docker pull ${{ env.IMAGE }}:latest
          docker save ${{ env.IMAGE }}:latest | gzip > cmtec-site-image.tar.gz
          ls -lh cmtec-site-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: cmtec-site-image
          path: cmtec-site-image.tar.gz
          retention-days: 1
