name: Build & push cmtecnologia.pt image (VPS)

# Builds the self-hosted Docker image in CI (Linux) and pushes it to GHCR.
# Build happens HERE, never on the VPS. The VPS only pulls + restarts.
# Server secrets (Gemini, Resend, Telegram) are NEVER built in; they live in the
# VPS runtime env file. See docs/DEPLOY.md.

on:
  push:
    # feat/vps-migration is included so the image builds during the cutover
    # while main stays untouched (Vercel fallback). Drop it after the merge.
    branches: [main, feat/vps-migration]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/mateusjuni0/cmtecnologia-site-v2

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
